global:
  scrape_interval: 15s # How often to check for data

scrape_configs:
  # 1. Prometheus monitors itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['url']

  # 2a. Karakeep VM hardware (the Docker container's own view)
  - job_name: 'node-exporter-karakeep-vm'
    static_configs:
      - targets: ['url']

  # 2b. pve-node1 (t620) bare-metal
  - job_name: 'node-exporter-pve-node1'  #spartan node
    static_configs:
      - targets: ['url']

  # 2c. pbs-pdm-node3 (Samsung RV510) bare-metal
  - job_name: 'node-exporter-pbs-pdm-node3'
    static_configs:
      - targets: ['url']

  # 2d. pve-node2 (prodesk) bare-metal
  - job_name: 'node-exporter-pve-node2'
    static_configs:
      - targets: ['url']

  # 3. Karakeep monitoring
  - job_name: 'karakeep'
    metrics_path: /api/metrics
    authorization:
      type: Bearer
      credentials: 'secret'
    static_configs:
      - targets: ['url']

 # 4a. UPS monitoring - main apcups on pve-node1 (Network A)
  - job_name: 'ups-apcups'
    metrics_path: /ups_metrics
    params:
      ups: ['apcups'] 
      server: ['url']
    static_configs:
      - targets: ['url']
        labels:
          ups: 'apcups'

  # 4b. UPS monitoring — vpcups on pve-node2 (Network B via NetBird)
  - job_name: 'ups-vpcups'
    metrics_path: /ups_metrics
    params:
      ups: ['vpcups']
      server: ['url']
      username: ['username']
      password: ['password']
    static_configs:
      - targets: ['url']
        labels:
          ups: 'vpcups'

  # 5. Internet monitoring
  - job_name: 'internet-uptime'
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
        - 8.8.8.8        # Google DNS
        - 1.1.1.1        # Cloudflare
        - 208.67.222.222 # OpenDNS
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # 6. Internal network monitoring (Network A LAN + NetBird mesh)
  - job_name: 'internal-network'
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - url     # Network A gateway/router
        labels:
          link_type: 'lan'
      - targets:
          - url   # spartan (Network A LAN)
          - url   # pbs-pdm-node3 (Network A LAN)
        labels:
          link_type: 'lan'
      - targets:
          - url     # spartan via NetBird
          - url     # pve-node2 via NetBird (Network B)
          - url     # pbs-pdm-node3 via NetBird
        labels:
          link_type: 'netbird'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

   # 7. HTTP service monitoring
  - job_name: 'http-services'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - url   # Grafana
          - url   # Prometheus
          - url   # Karakeep
          - url     # AdGuard Home
          - url   # n8n (LXC, own NetBird IP)
          - url  # Ollama (LXC, own NetBird IP)
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # 8. Continuous latency/jitter/loss probing
  - job_name: 'smokeping-prober'
    static_configs:
      - targets: ['url']

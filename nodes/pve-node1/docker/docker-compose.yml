services:
  # --- BOOKMARKING ---
  karakeep:
    image: ghcr.io/karakeep-app/karakeep:release
    container_name: karakeep
    ports:
      - "3000:3000"
    environment:
      - DATA_DIR=/data
      - DB_URL=file:/data/db.sqlite
      - NEXTAUTH_SECRET=secret
      - NEXTAUTH_URL=ip

      # --- Groq AI (0MB Local RAM Impact) ---
      - OPENAI_API_KEY=secret
      - OPENAI_BASE_URL=https://api.groq.com/openai/v1
      #- INFERENCE_TEXT_MODEL=qwen/qwen3-32b
      - INFERENCE_TEXT_MODEL=llama-3.3-70b-versatile
      - INFERENCE_IMAGE_MODEL=meta-llama/llama-4-scout-17b-16e-instruct
      - INFERENCE_OUTPUT_SCHEMA=plain
      - INFERENCE_ENABLE_AUTO_SUMMARIZATION=true

      # --- Search (Meilisearch) ---
      - SEARCH_BACKEND=meilisearch
      - MEILI_ADDR=ip
      - MEILI_MASTER_KEY=secret

      # --- Browser (Remote Chrome) ---
      - BROWSER_WEB_URL=ip
      # --- Prometheus Auth Token ---
      - PROMETHEUS_AUTH_TOKEN=secret
    volumes:
      - ./karakeep/data:/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.5'
    restart: always
    depends_on:
      - meilisearch
      - chrome

# Lightweight Search Engine (<30MB RAM)
  meilisearch:
    image: getmeili/meilisearch:v1.41.0
    container_name: meilisearch
    ports:
      - "7700:7700"
    restart: always
    environment:
      - MEILI_MASTER_KEY=secret
      - MEILI_NO_ANALYTICS=true
    volumes:
      - ./meilisearch_data:/meilisearch_data
    healthcheck:
      test: ["CMD", "curl", "-f", "url"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # Headless Browser (Modern Alpine Chrome)
  chrome:
    image: zenika/alpine-chrome:latest
    container_name: chrome
    command: [
      "--headless", 
      "--disable-gpu", 
      "--remote-debugging-address=0.0.0.0", 
      "--remote-debugging-port=9222",
      "--disable-dev-shm-usage",
      "--no-sandbox"
    ]
    deploy:
      resources:
        limits:
          memory: 400M # To not starve the T620
    restart: unless-stopped


  # --- MONITORING (The "Brain") ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=365d' # 1-YEAR DATA
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  # --- VISUALIZATION (The "Internal Webpage") ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana_data:/var/lib/grafana
    user: "472" # Standard Grafana UID
    restart: unless-stopped

  # --- HARDWARE DATA COLLECTOR ---
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
    restart: unless-stopped

  # --- UPS DATA COLLECTOR ---
  nut-exporter:
    image: druggeri/nut_exporter:latest
    container_name: nut-exporter
    environment:
      # Change this to your Proxmox Host IP
      - NUT_EXPORTER_SERVER=ip
    ports:
      - "9199:9199"
    restart: unless-stopped

  # --- INTERNET MONITORING ---
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    ports:
      - "9115:9115"
    restart: unless-stopped

  # --- NTFY NOTIFICATIONS ---
  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    command: serve
    ports:
      - "2586:80"
    volumes:
      - ./ntfy/data:/var/cache/ntfy
      - ./ntfy/config:/etc/ntfy
    restart: unless-stopped

  # --- CONTINUOUS LATENCY/JITTER/LOSS PROBING ---
  smokeping-prober:
    image: quay.io/superq/smokeping-prober:latest
    container_name: smokeping-prober
    cap_add:
      - NET_RAW
    volumes:
      - ./monitoring/smokeping-targets.yml:/config/targets.yml
    command:
      - '--config.file=/config/targets.yml'
    ports:
      - "9374:9374"
    restart: unless-stopped

# NUT upsmon.conf — spartan
# Monitors APC UPS locally as primary

MINSUPPLIES 1
SHUTDOWNCMD "/sbin/shutdown -h now"
POLLFREQ 5
POLLFREQALERT 5
HOSTSYNC 15
DEADTIME 15
POWERDOWNFLAG /var/lib/nut/ups.powerdown
FINALDELAY 300
RBWARNTIME 43200
NOCOMMWARNTIME 300

RUN_AS_USER nut

# Replace with your upsd.users credentials
MONITOR apcups@localhost 1 monuser YOUR_PASSWORD_HERE primary

# Notification flags — EXEC sends events to notify.sh
NOTIFYFLAG ONLINE    EXEC
NOTIFYFLAG OFFLINE   EXEC
NOTIFYFLAG LOWBATT   EXEC
NOTIFYFLAG FSD       EXEC

NOTIFYCMD "/usr/local/bin/notify.sh"
